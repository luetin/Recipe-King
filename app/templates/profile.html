{% extends "base.html" %}
{% block title %}Min profil - RecipeKing{% endblock %}
{% block content %}
<h1>Min profil</h1>

{% if request.query_params.get('saved') %}
<div class="alert" style="background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7; max-width:480px;">Profilen sparades.</div>
{% endif %}

<form method="post" action="/profile" enctype="multipart/form-data" style="max-width:480px;">

  <!-- Avatar -->
  <div class="profile-edit-avatar-wrap">
    <label for="avatar-input" class="profile-edit-avatar" title="Byt profilbild">
      {% if current_user.avatar_path %}
      <img src="/uploads/{{ current_user.avatar_path }}" alt="{{ current_user.name }}" id="avatar-preview">
      {% else %}
      <span id="avatar-initials">{{ current_user.name[0].upper() }}</span>
      <img id="avatar-preview" style="display:none;">
      {% endif %}
      <div class="profile-edit-avatar__overlay">📷</div>
    </label>
    <input type="file" id="avatar-input" name="avatar" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
    {% if current_user.avatar_path %}
    <form method="post" action="/profile/avatar/remove" style="margin-top:0.5rem;">
      <button type="submit" class="btn btn-secondary" style="font-size:0.8rem; padding:0.25rem 0.7rem;">Ta bort bild</button>
    </form>
    {% endif %}
  </div>

  <div class="field">
    <label for="display_name">Visningsnamn</label>
    <input type="text" id="display_name" name="display_name" value="{{ current_user.display_name or '' }}"
           placeholder="{{ current_user.email.split('@')[0] }}" maxlength="100">
  </div>

  <div class="field">
    <label>E-post</label>
    <input type="text" value="{{ current_user.email }}" disabled style="background:#f5f5f5; color:#888;">
  </div>

  <hr style="border:none; border-top:1px solid var(--color-border); margin:1rem 0;">
  <p class="muted" style="margin:0 0 0.75rem; font-size:0.9rem;">Byt lösenord (lämna tomt för att behålla)</p>

  <div class="field">
    <label for="current_password">Nuvarande lösenord</label>
    <input type="password" id="current_password" name="current_password" autocomplete="current-password">
  </div>
  <div class="field">
    <label for="new_password">Nytt lösenord</label>
    <input type="password" id="new_password" name="new_password" autocomplete="new-password">
  </div>

  <button type="submit" class="btn">Spara</button>
</form>

<script>
function previewAvatar(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var preview = document.getElementById('avatar-preview');
    var initials = document.getElementById('avatar-initials');
    preview.src = e.target.result;
    preview.style.display = 'block';
    if (initials) initials.style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}
</script>
{% endblock %}
