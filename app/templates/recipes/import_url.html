{% extends "base.html" %}
{% block title %}Importera från URL - RecipeKing{% endblock %}
{% block content %}
<h1>Importera recept från URL</h1>

<form method="post" action="/recipes/import/url" class="card" style="max-width:520px;">
  <div class="field">
    <label for="url">Recept-URL</label>
    <input type="url" id="url" name="url" required placeholder="https://www.ica.se/recept/...">
  </div>
  <button class="btn" type="submit">Hämta recept</button>
</form>

<div class="card" style="max-width:520px; margin-top:0;">
  <h2 style="margin-top:0; font-size:1rem;">Stödda sajter</h2>
  <div class="tag-filter-row" style="margin:0; gap:0.4rem;">
    {% if site_labels %}
      {% for label, domain in site_labels %}
      <span class="tag-chip">{{ label }}</span>
      {% endfor %}
    {% endif %}
  </div>
</div>
{% endblock %}
