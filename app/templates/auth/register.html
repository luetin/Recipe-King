{% extends "base.html" %}
{% block title %}Registrera - RecipeKing{% endblock %}
{% block content %}
<h1>Skapa konto</h1>
<form method="post" action="/register" class="card" style="max-width:400px;">
  <div class="field">
    <label for="email">E-post</label>
    <input type="email" id="email" name="email" required>
  </div>
  <div class="field">
    <label for="password">Lösenord</label>
    <input type="password" id="password" name="password" required minlength="8">
  </div>
  <button class="btn" type="submit">Registrera</button>
  <p class="muted">Har du redan ett konto? <a href="/login">Logga in</a></p>
</form>
{% endblock %}
