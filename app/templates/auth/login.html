{% extends "base.html" %}
{% block title %}Välj profil - RecipeKing{% endblock %}
{% block content %}
<div class="profile-picker">
  <h1 class="profile-picker__heading">Vem är det?</h1>

  {% if error %}
  <div class="alert alert-error" style="max-width:360px; margin:0 auto 1rem;">{{ error }}</div>
  {% endif %}

  <div class="profile-grid">
    {% for user in users %}
    <form method="post" action="/login/{{ user.id }}">
      <button type="submit" class="profile-card">
        <div class="profile-avatar">{{ user.name[0].upper() }}</div>
        <span class="profile-name">{{ user.name }}</span>
      </button>
    </form>
    {% endfor %}

    <div class="profile-card profile-card--new" onclick="document.getElementById('new-profile-form').classList.toggle('hidden')">
      <div class="profile-avatar profile-avatar--add">+</div>
      <span class="profile-name">Ny profil</span>
    </div>
  </div>

  <form id="new-profile-form" method="post" action="/register" class="new-profile-form hidden">
    <input type="text" name="display_name" placeholder="Ditt namn" maxlength="100" required>
    <button type="submit" class="btn">Skapa profil</button>
  </form>
</div>
{% endblock %}
